<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact AI Chronicles — send us a message or suggestion.">
  <meta name="author" content="Jose Gregorio Schmucke">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Contact | AI Chronicles">
  <meta property="og:description" content="Send a message to the AI Chronicles team.">
  <meta property="og:url" content="https://schmuckedj.github.io/wdd231/final/contact.html">
  <title>Contact | AI Chronicles</title>
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <header>
    <span class="logo">AI Chronicles</span>
  </header>

  <nav>
    <button class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="primary-nav">
      Menu
      <span class="hamburger" aria-hidden="true">
        <span></span><span></span><span></span>
      </span>
    </button>
    <ul id="primary-nav">
      <li><a href="index.html">Home</a></li>
      <li><a href="timeline.html">Timeline</a></li>
      <li><a href="pioneers.html">Pioneers</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <main>
    <h1 class="section-title">Contact Us</h1>
    <p style="color:var(--muted); margin-bottom:1.5rem; font-size:0.9rem;">Have a suggestion for a milestone we missed? Send us a message.</p>

    <div class="form-section">
      <form method="get" action="form-response.html">

        <label for="fname">
          First Name *
          <input type="text" id="fname" name="fname" autocomplete="given-name" required title="Enter your first name">
        </label>

        <label for="lname">
          Last Name *
          <input type="text" id="lname" name="lname" autocomplete="family-name" required title="Enter your last name">
        </label>

        <label for="email">
          Email *
          <input type="email" id="email" name="email" autocomplete="email" placeholder="you@example.com" required title="Enter your email">
        </label>

        <label for="topic">
          Topic of Interest
          <select id="topic" name="topic" title="Select a topic">
            <option value="">Select a topic…</option>
            <option value="milestone">Missing Milestone</option>
            <option value="pioneer">Missing Pioneer</option>
            <option value="correction">Correction</option>
            <option value="other">Other</option>
          </select>
        </label>

        <label for="message">
          Message *
          <textarea id="message" name="message" rows="5" required title="Enter your message" placeholder="Tell us what you think…"></textarea>
        </label>

        <input type="hidden" id="timestamp" name="timestamp">

        <input type="submit" value="Send Message" class="btn" style="border:none; padding: 0.65rem 1.5rem; cursor:pointer;">

      </form>
    </div>
  </main>

  <footer>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="timeline.html">Timeline</a>
      <a href="pioneers.html">Pioneers</a>
      <a href="contact.html">Contact</a>
      <a href="attributions.html">Attributions</a>
      <a href="https://www.loom.com/share/0e9af1ce99754f238c3662977b02c44b" target="_blank" rel="noopener">📹 Project Video</a>
    </div>
    <p>© <span id="year"></span> Jose Gregorio Schmucke · WDD 231 · AI Chronicles</p>
  </footer>

  <script type="module" src="scripts/nav.js"></script>
  <script>
    document.getElementById('timestamp').value = new Date().toLocaleString();
  </script>
</body>
</html>
